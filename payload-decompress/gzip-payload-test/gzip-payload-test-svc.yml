_format_version: "3.0"
_info:
  defaults: {}
  select_tags:
  - gzippayload
services:
- connect_timeout: 60000
  enabled: true
  host: 192.168.1.4
  name: gzip-payload-svc
  path: /upload
  port: 4040
  protocol: http
  read_timeout: 60000
  retries: 5
  routes:
  - https_redirect_status_code: 426
    id: 18f57e4e-4c89-454d-a4f8-86b39d35b3d9
    path_handling: v0
    paths:
    - /gzip-payload-demo
    preserve_host: false
    protocols:
    - http
    - https
    regex_priority: 0
    request_buffering: true
    response_buffering: true
    strip_path: true
    tags:
    - gzippayload
  tags:
  - gzippayload
  write_timeout: 60000
